{% extends 'admin_base.html' %}

{% block title %}Добавить товар{% endblock %}

{% block content %}

<style>
.container{
    max-width:900px;
    margin:30px auto;
}

.card{
    background:#fff;
    padding:30px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #d1d5db;
    border-radius:8px;
    font-size:15px;
    box-sizing:border-box;
}

select[multiple]{
    height:180px;
}

.error{
    background:#fee2e2;
    color:#991b1b;
    padding:12px;
    border-radius:8px;
    margin-bottom:20px;
}

.btn{
    background:#16a34a;
    color:white;
    border:none;
    padding:14px 24px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}

.btn:hover{
    background:#15803d;
}

small{
    color:#64748b;
}
</style>

<div class="container">

<div class="card">

<h1>➕ Добавление товара</h1>

{% if error %}
<div class="error">
    {{ error }}
</div>
{% endif %}

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<div class="form-group">
<label>Название товара</label>

<input
type="text"
name="title"
maxlength="40"
required>
</div>


<div class="form-group">
<label>Категория</label>

<select name="category" required>

<option value="">
Выберите категорию
</option>

{% for category in categories %}
<option value="{{ category.id }}">
{{ category.name }}
</option>
{% endfor %}

</select>

</div>


<div class="form-group">

<label>Цена</label>

<input
type="number"
name="price"
step="0.01"
min="0"
required>

</div>


<div class="form-group">

<label>Количество</label>

<input
type="number"
name="stock"
min="0"
value="0"
required>

</div>


<div class="form-group">

<label>Главное изображение</label>

<input
type="file"
name="product_image"
accept="image/*">

</div>


<div class="form-group">

<label>Дополнительные фотографии</label>

<input
type="file"
name="gallery_images"
accept="image/*"
multiple>

<small>
Можно выбрать до 10 изображений.
</small>

</div>


<div class="form-group">

<label>Теги</label>

<select
name="selected_tags"
multiple>

{% for tag in tags %}
<option value="{{ tag.id }}">
{{ tag.name }}
</option>
{% endfor %}

</select>

<small>
Удерживайте Ctrl для выбора нескольких тегов.
</small>

</div>


<button class="btn" type="submit">

📦 Отправить на модерацию

</button>

</form>

</div>

</div>

{% endblock %}
