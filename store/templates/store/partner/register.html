{% extends "base.html" %}

{% block content %}

<h2>Стать партнёром</h2>

<form method="post">
    {% csrf_token %}

    <div class="form-group">
        <label>Название компании</label>
        <input
            type="text"
            name="company_name"
            required
        >
    </div>

    <div class="form-group">
        <label>Телефон</label>
        <input
            type="text"
            name="phone"
            required
        >
    </div>

    <div class="form-group">
        <label>Сайт</label>
        <input
            type="url"
            name="website"
        >
    </div>

    <div class="form-group">
        <label>О компании</label>

        <textarea
            name="description"
            rows="6"
        ></textarea>
    </div>

    <button type="submit">
        🚀 Отправить заявку
    </button>

</form>

{% endblock %}
